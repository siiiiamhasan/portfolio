<!doctype html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
  <!-- Glass Overlay -->
<div
  class="fixed inset-0 bg-black/10 backdrop-blur-sm flex items-center justify-center z-50">
  <h1
    class="text-white text-5xl sm:text-6xl font-extrabold tracking-wide drop-shadow-[0_4px_10px_rgba(0,0,0,50)]">
    I'm Working On It
  </h1>
</div>


  <section class="min-h-screen bg-gray-900 text-white flex items-center justify-center p-4 sm:p-8">
    <div class="container mx-auto grid md:grid-cols-2 gap-8 items-center max-w-6xl">
      <div class="space-y-6 md:space-y-8">
        <div class="absolute top-4 left-4 sm:top-8 sm:left-8 md:static text-sm font-semibold tracking-widest uppercase">
          siam hasan
        </div>
        <h1 class="text-4xl sm:text-5xl lg:text-7xl font-extrabold leading-tight pt-10 md:pt-0">
          HI, I AM<br>
          <span class="text-lime-400">SIAM HASAN.</span>
        </h1>
        <p class="text-lg text-gray-400 max-w-md">
          A Sydney based front-end developer passionate about building accessible and user-friendly websites.
        </p>
        <div class="flex items-center space-x-4">
          <a href="#"
            class="flex items-center bg-lime-400 text-black py-3 px-6 rounded-full font-semibold hover:bg-lime-300 transition duration-300">
            CONTACT ME
            <span class="w-2 h-2 bg-black rounded-full ml-2"></span>
          </a>
          <a href="#"
            class="w-10 h-10 border border-gray-600 rounded-full flex items-center justify-center text-gray-400 hover:border-lime-400 hover:text-lime-400 transition duration-300"
            aria-label="LinkedIn">
            <svg fill="#000000" width="100px" height="100px" viewBox="0 0 24 24" id="facebook" data-name="Line Color"
              xmlns="http://www.w3.org/2000/svg" class="icon line-color">
              <path id="primary" d="M14,7h4V3H14A5,5,0,0,0,9,8v3H6v4H9v6h4V15h3l1-4H13V8A1,1,0,0,1,14,7Z"
                style="fill: none; stroke: rgb(255, 255, 255); stroke-linecap: round; stroke-linejoin: round; "></path>
            </svg>
          </a>
          <a href="#"
            class="w-10 h-10 border border-gray-600 rounded-full flex items-center justify-center text-gray-400 hover:border-lime-400 hover:text-lime-400 transition duration-300"
            aria-label="Github">
            <svg width="800px" height="800px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path
                d="M3 11C3 7.22876 3 5.34315 4.17157 4.17157C5.34315 3 7.22876 3 11 3H13C16.7712 3 18.6569 3 19.8284 4.17157C21 5.34315 21 7.22876 21 11V13C21 16.7712 21 18.6569 19.8284 19.8284C18.6569 21 16.7712 21 13 21H11C7.22876 21 5.34315 21 4.17157 19.8284C3 18.6569 3 16.7712 3 13V11Z"
                stroke="#222222" />
              <circle cx="16.5" cy="7.5" r="1.5" fill="#222222" />
              <circle cx="12" cy="12" r="3.5" stroke="#222222" />
            </svg>
          </a>
        </div>
      </div>
      <div class="relative mx-[50px] flex justify-center md:justify-end order-first md:order-none">
        <div
          class="w-full max-w-sm md:max-w-none md:w-full aspect-square bg-gray-600 rounded-2xl overflow-hidden shadow-2xl">
          <img src="image/benner.jpg" alt="Robert Garcia portrait" class="object-cover overflow-hidden w-full h-full" />
        </div>
      </div>
    </div>
    <nav class="absolute top-4 right-4 sm:top-8 sm:right-8 hidden md:block">
      <ul class="flex space-x-6 text-sm font-semibold tracking-widest uppercase">
        <li><a href="#" class="hover:text-lime-400 transition duration-300">Work</a></li>
        <li><a href="#" class="hover:text-lime-400 transition duration-300">About</a></li>
        <li><a href="#" class="hover:text-lime-400 transition duration-300">Contact</a></li>
      </ul>
    </nav>
  </section>
</body>

</html>
